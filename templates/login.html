
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCam NOC - Autenticação</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            background:#04060d;
        }

        .font-tech{
            font-family:'JetBrains Mono',monospace;
        }

        .login-card{
            background:#090d16;
            border:1px solid rgba(30,41,59,.8);
            box-shadow:
                0 0 30px rgba(0,0,0,.35),
                0 0 50px rgba(6,182,212,.04);
            backdrop-filter:blur(10px);
        }

        .input-field{
            background:#05070d;
            color:#e2e8f0;
            border:1px solid #1e293b;
            transition:.25s;
        }

        .input-field:focus{
            border-color:#06b6d4;
            box-shadow:0 0 12px rgba(6,182,212,.18);
            outline:none;
        }

        .input-field::placeholder{
            color:#475569;
        }

        .logo-glow{
            filter:
                drop-shadow(0 0 12px rgba(6,182,212,.25))
                drop-shadow(0 0 24px rgba(6,182,212,.18))
                drop-shadow(0 0 40px rgba(6,182,212,.10));
        }

        .background-grid{
            background-image:
                linear-gradient(rgba(6,182,212,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.03) 1px, transparent 1px);
            background-size:40px 40px;
        }
    </style>
</head>

<body class="background-grid text-slate-200 antialiased selection:bg-cyan-500/30 flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <!-- Glow de fundo -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">

        <div class="absolute top-[-200px] left-1/2 -translate-x-1/2 w-[700px] h-[700px] bg-cyan-500/5 blur-3xl rounded-full"></div>

        <div class="absolute bottom-[-300px] right-[-200px] w-[500px] h-[500px] bg-cyan-400/5 blur-3xl rounded-full"></div>

    </div>

    <div class="relative w-full max-w-[460px] flex flex-col items-center py-8 z-10">

        <!-- LOGO -->
        <div class="text-center mb-8">

            <img
                src="{{ url_for('static', filename='assents/logo.png') }}"
                alt="Secticom"
                class="mx-auto w-80 logo-glow select-none"
            >
            <p class="text-slate-500 text-xs font-tech tracking-[4px] mt-4 uppercase">
                TECNOLOGIA EM SISTEMAS DE SEGURANÇA
            </p>

        </div>

        <!-- CARD LOGIN -->
        <div class="login-card w-full p-8 md:p-10 rounded-3xl">

            <div class="mb-6">

                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">
                    Acesso ao Terminal
                </h2>

                <p class="text-slate-500 text-xs mt-1">
                    Insira suas credenciais homologadas no NOC.
                </p>

            </div>

            <form method="POST" action="#" class="space-y-4">

                <div class="relative">

                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-user text-xs"></i>
                    </div>

                    <input
                        type="text"
                        name="username"
                        required
                        placeholder="Identificador do usuário"
                        class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm font-tech"
                    >

                </div>

                <div class="relative">

                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock text-xs"></i>
                    </div>

                    <input
                        type="password"
                        name="senha"
                        required
                        placeholder="Palavra-passe corporativa"
                        class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm font-tech"
                    >

                </div>

                <button
                    type="submit"
                    class="w-full bg-cyan-950/40 hover:bg-cyan-900/50 text-cyan-400 hover:text-cyan-300 border border-cyan-500/20 hover:border-cyan-400/40 font-bold py-3.5 rounded-lg text-xs font-tech shadow-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest cursor-pointer mt-6"
                >
                    Autenticar Terminal
                    <i class="fa-solid fa-right-to-bracket text-[11px]"></i>
                </button>

            </form>

            <div class="mt-8 pt-5 border-t border-slate-800/80 text-center">

                <p class="text-[10px] font-tech text-slate-600 uppercase tracking-widest">
                    Acesso Restrito • Agente v3.1.2
                </p>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="mt-8 text-center font-tech">

            <p class="text-slate-600 text-[11px]">

                <span class="block">
                    © 2026 Secticom Security Systems
                </span>

                <span class="block mt-2 text-slate-700 text-[10px] uppercase tracking-wider">
                    Todos os acessos são monitorados e logados por IP
                </span>

            </p>

        </div>

    </div>

</body>
</html>
