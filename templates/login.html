<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Control Cam | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d111a; /* Fundo escuro profundo da imagem */
        }

        .login-card {
            background-color: #1a2233; /* Cor exata do card na imagem */
            border-radius: 40px; /* Bordas bem arredondadas conforme o print */
        }

        .input-field {
            background-color: #ffffff;
            color: #333;
            border-radius: 4px;
            padding: 12px 12px 12px 45px;
            width: 100%;
            font-size: 20px;
            border: none;
            outline: none;
        }

        .input-field::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        .btn-primary {
            background-color: #2563eb;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background-color: #3b82f6;
        }

        /* Ajuste fino dos ícones dentro do input branco */
        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.2rem;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-[500px] px-6 py-12 flex flex-col items-center">

        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-[100px] h-[100px] bg-[#2563eb] rounded-[30px] mb-8 shadow-lg">
                <i class="fa-solid fa-shield-halved text-white text-5xl"></i>
            </div>

            <h1 class="text-5xl font-black text-white tracking-tight italic uppercase">
                CONTROL <span class="text-[#4285f4]">CAM</span>
            </h1>
            <p class="text-slate-500 text-lg mt-3 font-medium opacity-80">
                Sistema de Monitoramento e Gestão
            </p>
        </div>

        <div class="login-card w-full p-10 md:p-14 shadow-2xl">

            <form method="POST" action="#" class="space-y-6">

                <div class="relative">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="Identificador do usuário" class="input-field">
                </div>

                <div class="relative">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="senha" placeholder="Palavra-passe" class="input-field">

                </div>

                <button type="submit" class="btn-primary w-full text-white font-bold py-5 rounded-2xl text-xl shadow-lg flex items-center justify-center gap-3 uppercase tracking-wider">
                    Autenticar <i class="fa-solid fa-right-to-bracket opacity-70"></i>
                </button>

            </form>

            <div class="mt-12 pt-8 border-t border-slate-700/50 text-center">
                <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.2em] opacity-60">
                    Acesso Restrito • Agente v3.1.2
                </p>
            </div>
        </div>

        <div class="mt-12 text-center">
            <p class="text-slate-600 text-sm leading-relaxed font-medium">
                &copy; 2026 Control Cam Security Systems.<br>
                <span class="opacity-80">Todos os acessos são logados por IP.</span>
            </p>
        </div>

    </div>

</body>
</html>
