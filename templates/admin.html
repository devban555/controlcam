<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Global</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 min-h-screen p-10">

<div class="max-w-7xl mx-auto">

<h1 class="text-3xl text-white font-bold mb-8">
Painel Administrativo Global
</h1>

<!-- Criar Empresa -->
<div class="bg-slate-800 p-6 rounded-xl mb-10">
<form method="POST" action="{{ url_for('criar_empresa') }}">
<input name="nome_empresa" placeholder="Nome da Empresa"
class="p-3 rounded bg-slate-700 text-white w-1/2">
<button class="bg-blue-600 px-6 py-3 rounded text-white">
Criar Empresa
</button>
</form>
</div>

<!-- Lista Empresas -->
<div class="bg-slate-800 p-6 rounded-xl">
<table class="w-full text-gray-300">
<thead>
<tr class="border-b border-slate-600">
<th>ID</th>
<th>Empresa</th>
<th>Token</th>
<th>Ações</th>
</tr>
</thead>
<tbody>
{% for empresa in empresas %}
<tr class="border-b border-slate-700">
<td>{{ empresa.id }}</td>
<td>{{ empresa.nome_empresa }}</td>
<td class="text-xs">{{ empresa.token_api }}</td>
<td class="space-x-2">
<a href="{{ url_for('ver_agentes', empresa_id=empresa.id) }}"
class="bg-green-600 px-3 py-1 rounded text-white text-sm">
Agentes
</a>

<a href="{{ url_for('excluir_empresa', empresa_id=empresa.id) }}"
class="bg-red-600 px-3 py-1 rounded text-white text-sm">
Excluir
</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

</div>
</body>
</html>
