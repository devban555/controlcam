<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCam NOC - Registrar Operador</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #04060d;
        }

        .font-tech {
            font-family: 'JetBrains Mono', monospace;
        }

        .login-card {
            background-color: #090d16;
            border: 1px solid rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 30px -5px rgba(6, 182, 212, 0.05);
        }

        .input-field {
            background-color: #05070d;
            color: #e2e8f0;
            border: 1px solid #1e293b;
            transition: all 0.2s ease-in-out;
        }

        .input-field:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 10px -2px rgba(6, 182, 212, 0.2);
            outline: none;
        }

        .input-field::placeholder {
            color: #475569;
        }
    </style>
</head>

<body class="text-slate-200 antialiased selection:bg-cyan-500/30 flex items-center justify-center min-h-screen p-4 overflow-y-auto">

    <div class="w-full max-w-[460px] flex flex-col items-center py-8">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-cyan-950/40 to-slate-900 border border-cyan-500/30 rounded-2xl mb-5 shadow-lg shadow-cyan-950/20">
                <i class="fa-solid fa-user-plus text-cyan-400 text-xl"></i>
            </div>

            <h1 class="text-3xl font-extrabold text-white tracking-tight italic uppercase">
                NOVO <span class="text-cyan-400">CADASTRO</span>
            </h1>
            <p class="text-slate-500 text-xs font-tech tracking-wide mt-1.5 uppercase">
                Provisionamento de Credenciais
            </p>
        </div>

        <div class="login-card w-full p-8 md:p-10 rounded-2xl">

            <div class="mb-6">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Registrar Operador</h2>
                <p class="text-slate-500 text-xs mt-0.5">Insira os dados para solicitar acesso ao provisionamento.</p>
            </div>

            <form method="POST" action="#" class="space-y-4">

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-address-card text-xs"></i>
                    </div>
                    <input type="text"
                           name="username"
                           required
                           placeholder="Nome de usuário"
                           class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm font-tech">
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-envelope text-xs"></i>
                    </div>
                    <input type="email"
                           name="email"
                           required
                           placeholder="E-mail corporativo"
                           class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm font-tech">
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-500">
                        <i class="fa-solid fa-lock text-xs"></i>
                    </div>
                    <input type="password"
                           name="senha"
                           required
                           placeholder="Criar palavra-passe corporativa"
                           class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-sm font-tech">
                </div>

                <button type="submit"
                        class="w-full bg-cyan-950/40 hover:bg-cyan-900/50 text-cyan-400 hover:text-cyan-300 border border-cyan-500/20 hover:border-cyan-400/40 font-bold py-3.5 rounded-lg text-xs font-tech shadow-lg transition-all flex items-center justify-center gap-2 uppercase tracking-widest cursor-pointer mt-6">
                    Criar Conta
                    <i class="fa-solid fa-check-double text-[11px] opacity-80"></i>
                </button>

            </form>

            <div class="mt-8 pt-5 border-t border-slate-800/80 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-slate-500 hover:text-cyan-400 font-tech text-xs tracking-wide transition-colors inline-flex items-center gap-2 no-underline">
                    <i class="fa-solid fa-arrow-left text-[10px]"></i> Voltar para o terminal de login
                </a>
            </div>
        </div>

        <div class="mt-8 text-center font-tech">
            <p class="text-slate-600 text-[11px] space-y-1">
                <span class="block">&copy; 2026 Control Cam Security Systems.</span>
                <span class="text-slate-700 text-[10px] block uppercase tracking-wide">A aprovação deste registro é auditada pelo administrador.</span>
            </p>
        </div>

    </div>

</body>
</html>
